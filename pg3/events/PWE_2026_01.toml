# ═══════════════════════════════════════════════════════════════════════════════
# COST RULES
# Define how costs are calculated for each registration.
# Use the alias names defined above (not the full field names).
# ═══════════════════════════════════════════════════════════════════════════════

# [costs]
# Base cost that everyone pays
# base = 0.0

# Example rule format:
# [[costs.rules]]
# field = "alias_name"  # Use an alias from the [aliases] section
# value = "Ja"         # or use pattern = "regex" for partial match
# cost = 25.0

# ───────────────────────────────────────────────────────────────────────────────
# ADVANCED: Computed fields for multipliers
# ───────────────────────────────────────────────────────────────────────────────
#
# Use computed fields to create multipliers, e.g., for per-night costs:
#
# [costs.computed_fields.nights]
# sum_of = [
#     { field = "uebernachtung_fr", value = "Ja", count = 1 },
#     { field = "uebernachtung_sa", value = "Ja", count = 1 },
# ]
#
# Then use in a rule with multiply_by:
# [[costs.rules]]
# field = "zimmer"
# pattern = "Einzelzimmer"
# cost = 10.0
# multiply_by = "nights"  # 10€ per night for single room

# ───────────────────────────────────────────────────────────────────────────────
# ADVANCED: Bundled options (conditional rules)
# ───────────────────────────────────────────────────────────────────────────────
#
# Use 'unless' and 'only_if' to create conditional cost rules:
#
# EXAMPLE: Overnight stay includes meals, but meals can be booked separately
#
# # Overnight includes meals (50€ total)
# [[costs.rules]]
# field = "uebernachtung_fr"
# value = "Ja"
# cost = 50.0
#
# # Dinner charged separately (15€) UNLESS staying overnight
# [[costs.rules]]
# field = "abendessen_fr"
# value = "Ja"
# cost = 15.0
# unless = { field = "uebernachtung_fr", value = "Ja" }
#
# # Breakfast (10€) UNLESS staying overnight Friday OR Saturday
# [[costs.rules]]
# field = "fruehstueck_sa"
# value = "Ja"
# cost = 10.0
# unless = [
#     { field = "uebernachtung_fr", value = "Ja" },
#     { field = "uebernachtung_sa", value = "Ja" }
# ]
#
# EXAMPLE: Discount only for specific groups
#
# # Student discount ONLY IF both student AND member
# [[costs.rules]]
# field = "rabatt_student"
# value = "Ja"
# cost = -10.0
# only_if = [
#     { field = "student", value = "Ja" },
#     { field = "mitglied", value = "Ja" }
# ]
#
# Both 'unless' and 'only_if' support:
#   - Single condition: unless = { field = "X", value = "Y" }
#   - Multiple conditions: unless = [{ ... }, { ... }]
#   - Pattern matching: unless = { field = "X", pattern = "regex" }
#
# Logic:
#   - 'unless': Skip rule if ANY condition matches (OR logic)
#   - 'only_if': Skip rule unless ALL conditions match (AND logic)

# ═══════════════════════════════════════════════════════════════════════════════
# REGISTRATION DETAIL EXPORT
# Controls the column order for 'eventreg export-registration-details'.
# Only the columns listed here are exported; add or remove entries as needed.
# Form field aliases are resolved automatically to actual field names.
# ═══════════════════════════════════════════════════════════════════════════════

[export.registration_details]
columns = [
    # Add additional field aliases below once registrations are available
    "reference_number",
    "first_name",
    "last_name",
    "email",
    "registration_date",
    "computed_cost"
]
