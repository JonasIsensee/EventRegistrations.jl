    "stimme",  # → Stimmgruppe
    "uebernachtung_fr",  # → Übernachtung Freitag (46€ inkl. Vollpension)
    "uebernachtung_sa",  # → Übernachtung Samstag (46€ ink. Vollpension)
    "abendessen_freitag_e",  # → Abendessen Freitag (enhalten in Übernachtung Fr, sonst +10€)
    "fruehstueck_samstag",  # → Frühstück Samstag (enhalten in Übernachtung Fr, sonst +8€)
    "mittagessen_samstag",  # → Mittagessen Samstag (enhalten in Übernachtung Fr, sonst +10€)
    "abendessen_samstag_e",  # → Abendessen Samstag (enhalten in Übernachtung Sa, sonst +10€)
    "fruehstueck_sonntag",  # → Frühstück Sonntag (enhalten in Übernachtung Sa, sonst +8€)
    "mittag_sonntag_enhal",  # → Mittag Sonntag (enhalten in Übernachtung Sa, sonst +10€)
    "essen",  # → Essen
    "unterbringung",  # → Unterbringung
    "belegungswunsch",  # → Belegungswunsch
    "lebensmittelunvertra",  # → Lebensmittelunverträglichkeiten / Allergien
    "sonstiges_hier_kanns",  # → Sonstiges: Hier kannst du zum Beispiel Mitfahrgelegenheiten anbieten
    "email",  # → E-Mail
]
