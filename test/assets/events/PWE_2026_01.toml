[event]
name = "Probenwochenende Chor"

# ═══════════════════════════════════════════════════════════════════════════════
# FIELD ALIASES
# Maps short, easy-to-use names to actual field names from form submissions.
# Use these aliases (left side) in the cost rules below.
# ═══════════════════════════════════════════════════════════════════════════════

[aliases]
# Values: , Bloß nicht mit Maria, Ich würde mir aber mit Maria ein Zimmer teilen, ...
belegungswunsch_fuer = "Belegungswunsch für das Zimmer"

# Values: Ja, Nein
busfahrt_hinweg_10 = "Busfahrt Hinweg (10€)"

# Values: Ja, Nein
busfahrt_rueckweg_10 = "Busfahrt Rückweg (10€)"

# Values: dieechtemaria@jonasisensee.de, hannah@jonasisensee.de, mariamueller@jonasisensee.de, ...
email = "E-Mail"

# Values: Alles, Vegan, Vegetarisch
essen = "Essen"

# Values: , Erdnüsse, Keine Nüsse
lebensmittelunvertra = "Lebensmittelunverträglichkeiten / Allergien"

# Values: Arendt, Isensee, Müller, ...
nachname = "Nachname"

# Values: , Ich habe im Lotto gewonnen., Ich möchte mit dem Flugzeug zurück fliegen
sonstiges = "Sonstiges"

# Values: Alt, Bariton, Kontrabass, ...
stimme = "Stimmgruppe"

# Values: Hannah, Jonas, Maria, ...
vorname = "Vorname"

# Values: Einzelzimmer (+10 € pro Nacht), Mehrbettzimmer
wie_moechte_ich_uebe = "Wie möchte ich übernachten?"

# Values: Ja
uebernachtung_freita = "Übernachtung Freitag"

# Values: Ja
uebernachtung_samsta = "Übernachtung Samstag"

# ═══════════════════════════════════════════════════════════════════════════════
# COST RULES
# Define how costs are calculated for each registration.
# Use the alias names defined above (not the full field names).
# ═══════════════════════════════════════════════════════════════════════════════

[costs]
# Base cost that everyone pays
base = 0.0

# Cost rules - each rule adds to the total when conditions match
# Uncomment and modify as needed

[[costs.rules]]
field = "busfahrt_hinweg_10"  # → "Busfahrt Hinweg (10€)"
value = "Ja"
cost = 10.0  # TODO: set cost

[[costs.rules]]
field = "busfahrt_rueckweg_10"  # → "Busfahrt Rückweg (10€)"
value = "Ja"
cost = 20.0  # TODO: set cost

