# value = "Ja"
# cost = 0.0  # TODO: set cost

# [[costs.rules]]
# field = "uebernachtung_samsta"  # → "Übernachtung Samstag"
# value = "Ja"
# cost = 0.0  # TODO: set cost

# ───────────────────────────────────────────────────────────────────────────────
# ADVANCED: Computed fields for multipliers
# ───────────────────────────────────────────────────────────────────────────────
#
# Use computed fields to create multipliers, e.g., for per-night costs:
#
# [costs.computed_fields.nights]
# sum_of = [
#     { field = "uebernachtung_freita", value = "Ja", count = 1 },
#     { field = "uebernachtung_samsta", value = "Ja", count = 1 },
# ]
#
# Then use in a rule with multiply_by:
# [[costs.rules]]
# field = "zimmer"
# pattern = "Einzelzimmer"
# cost = 10.0
# multiply_by = "nights"  # 10€ per night for single room



[export.registration_details]
columns = [
    "reference_number",
    "Vorname",
    "Nachname",
    "E-Mail",
    "busfahrt_hinweg_10",
    "busfahrt_rueckweg_10",
    "uebernachtung_freita",
    "uebernachtung_samsta",
    "Essen",
    "sonstiges",
]
